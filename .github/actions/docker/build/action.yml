name: Docker Build
description: Build Docker Image
inputs:
  image-name:
    description: Docker Image Name
    default: ${{ github.repository }}
  push:
    description: Push docker image?
    required: false
    default: "false"
  context:
    description: Docker context path
    default: "."
  build-args:
    description: List of build args
    required: false

outputs:
  docker-tags:
    description: Docker tags
    value: ${{ steps.meta.outputs.tags }}
  docker-labels:
    description: Docker labels
    value: ${{ steps.meta.outputs.labels }}

runs:
  using: composite
  steps:
    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: descope/.github/.github/actions/docker/metadata@50e1b69eb3d8f458365b1c9e6e28ee60eaf12b72 # main
      with:
        images: |
          ${{inputs.image-name}}

    - name: Build and push Docker image
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
      with:
        build-args: ${{ inputs.build-args }}
        context: ${{ inputs.context }}
        push: ${{ inputs.push }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: |
          ${{ steps.meta.outputs.labels }}
          org.opencontainers.image.description=${{ steps.meta.outputs.description }}
        outputs: type=image,name=target,annotation-index.org.opencontainers.image.description=${{ steps.meta.outputs.description }},annotation-index.github.sha=${{ github.sha }}

